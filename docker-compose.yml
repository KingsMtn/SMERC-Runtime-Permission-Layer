services:
  smerc-api:
    build: .
    ports:
      - "8788:8788"
    environment:
      SMERC_API_KEYS: ${SMERC_API_KEYS:-}
      SMERC_API_PRINCIPALS: ${SMERC_API_PRINCIPALS:-}
      SMERC_PERMIT_KEYS: ${SMERC_PERMIT_KEYS:-}
      SMERC_CONTROL_EVIDENCE_KEYS: ${SMERC_CONTROL_EVIDENCE_KEYS:-}
      SMERC_AUDIT_DB: /data/smerc_audit.sqlite3
      SMERC_MAX_BODY_BYTES: "262144"
      SMERC_MAX_BATCH_SIZE: "100"
    volumes:
      - smerc-audit-data:/data
    restart: unless-stopped

volumes:
  smerc-audit-data:
