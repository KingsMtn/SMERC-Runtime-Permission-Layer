name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  console-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check console JavaScript syntax
        run: |
          node --check pilot_console/app.js
          node --check pilot_console/model.mjs
          node --check smerc_js_sdk/client.mjs
          node --check smerc_js_sdk/index.mjs

      - name: Run console model tests
        run: node --test tests/js/*.test.mjs

  unittest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile service and integration modules
        run: python -m compileall -q api_server.py reference_engine integrations

      - name: Validate machine-readable contracts
        run: |
          python -c 'import json; paths=["schemas/smerc-action-language-v1.schema.json", "schemas/smerc-decision-language-v1.schema.json", "schemas/smerc-runtime-policy-v1.schema.json", "schemas/smerc-evidence-ledger-v1.schema.json", "schemas/smerc-action-bound-permit-v1.schema.json", "schemas/smerc-authenticated-principal-v1.schema.json", "schemas/smerc-security-event-v1.schema.json", "schemas/smerc-control-evidence-v1.schema.json", "schemas/smerc-access-token-v1.schema.json", "schemas/smerc-access-token-v2.schema.json", "schemas/smerc-github-oidc-trust-v1.schema.json", "schemas/smerc-execution-plan-v1.schema.json", "schemas/smerc-execution-report-v1.schema.json"]; [json.load(open(path)) for path in paths]'

      - name: Validate deployment composite contract without execution
        id: deployment-contract
        uses: ./integrations/github_deployment
        with:
          action-file: examples/action_language/production_canary_release.json
          plan-file: examples/github_deployment/execution_plan.json
          mode: validate
          report-file: /tmp/smerc-execution-report.json

      - name: Assert deployment validation output
        env:
          SMERC_EXECUTION_OUTCOME: ${{ steps.deployment-contract.outputs.outcome }}
        run: |
          test "$SMERC_EXECUTION_OUTCOME" = "VALIDATED"
          python -c 'import json; data=json.load(open("/tmp/smerc-execution-report.json")); assert data["outcome"] == "VALIDATED"'

      - name: Run recoverability engine smoke test
        run: python -m reference_engine.recoverability_engine examples/recoverability_single_action.json

      - name: Run financial profile smoke test
        run: python -m reference_engine.financial_permission_profile examples/financial_action_requests.json

      - name: Run financial replay smoke test
        run: python -m reference_engine.financial_replay examples/financial_replay_scenarios.json

      - name: Run policy comparison smoke test
        run: python -m reference_engine.financial_policy_comparison examples/financial_action_requests.json

      - name: Run audit-chain smoke test
        run: python -m reference_engine.financial_audit examples/financial_action_requests.json

      - name: Run evidence ceiling smoke test
        run: |
          python -m reference_engine.evidence_program \
            examples/evidence_program/core_assumptions.json \
            examples/evidence_program/no_observations.json \
            --json-output /tmp/smerc-evidence.json
          python -c 'import json; data=json.load(open("/tmp/smerc-evidence.json")); assert data["deployment_ceiling"] == "OBSERVE"'

      - name: Run policy and evidence provenance smoke tests
        run: |
          python -m reference_engine.recoverability_engine \
            examples/recoverability_single_action.json \
            --policy examples/policies/alpha_conservative.json \
            > /tmp/smerc-policy-decision.json
          python -c 'import json; data=json.load(open("/tmp/smerc-policy-decision.json")); assert data["policy"]["tenant_id"] == "alpha"; assert len(data["policy"]["policy_hash"]) == 64'
          python -m reference_engine.evidence_provenance build \
            examples/evidence_program/synthetic_observations.json \
            examples/evidence_program/synthetic_artifact_digests.json \
            /tmp/smerc-evidence-ledger.json \
            --program-id smerc-core-validation-v1 \
            --collector-id ci-collector \
            --collection-method ci-smoke
          python -m reference_engine.evidence_provenance verify \
            examples/evidence_program/synthetic_observations.json \
            /tmp/smerc-evidence-ledger.json

  container-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build pilot API image
        run: docker build -t smerc-pilot-api:test .

      - name: Request GitHub OIDC identity and prepare exact CI trust
        run: |
          curl --fail --silent --show-error \
            --header "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=smerc-runtime-api" \
            > /tmp/github-oidc-response.json
          python - <<'PY'
          import base64, json
          response = json.load(open('/tmp/github-oidc-response.json'))
          token = response['value']
          payload = token.split('.')[1]
          claims = json.loads(base64.urlsafe_b64decode(payload + '=' * (-len(payload) % 4)))
          trust = [{
              'tenant_id': 'ci-tenant',
              'repository': claims['repository'],
              'repository_id': str(claims['repository_id']),
              'repository_owner_id': str(claims['repository_owner_id']),
              'subjects': [claims['sub']],
              'refs': [claims['ref']],
              'workflow_refs': [claims['workflow_ref']],
              'workflow_shas': [claims['workflow_sha']],
              'events': [claims['event_name']],
              'environments': [claims['environment']] if claims.get('environment') else [],
              'scopes': ['actions.evaluate'],
              'runner_environments': [claims['runner_environment']],
          }]
          open('/tmp/github-oidc-token.txt', 'w').write(token)
          json.dump(trust, open('/tmp/github-oidc-trust.json', 'w'), separators=(',', ':'))
          PY
          chmod 600 /tmp/github-oidc-token.txt
          rm /tmp/github-oidc-response.json

      - name: Start authenticated pilot API
        run: |
          docker run --detach --name smerc-pilot-api --publish 8788:8788 \
            --env SMERC_API_PRINCIPALS=ci-tenant:ci-proposer:actions.evaluate=ci-proposer-secret-012345678901,ci-tenant:ci-reviewer:reviews.write=ci-reviewer-secret-012345678901,ci-tenant:ci-auditor:metrics.read=ci-auditor-secret-0123456789012 \
            --env SMERC_PERMIT_KEYS=ci-tenant=ci-permit-key:ci-permit-signing-secret-012345678901 \
            --env SMERC_CONTROL_EVIDENCE_KEYS=ci-tenant:ci-executor=ci-adapter:ci-control-key:ci-control-evidence-secret-012345678901 \
            --env SMERC_ACCESS_TOKEN_KEY=ci-access-key:ci-access-token-secret-01234567890123 \
            --env SMERC_GITHUB_OIDC_TRUST="$(cat /tmp/github-oidc-trust.json)" \
            smerc-pilot-api:test

      - name: Wait for health check
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8788/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs smerc-pilot-api
          exit 1

      - name: Evaluate example action through container
        run: |
          curl --fail --silent http://127.0.0.1:8788/health > /tmp/smerc-health.json
          python -c 'import json; data=json.load(open("/tmp/smerc-health.json")); assert data["permit_signer_count"] == 1; assert data["control_evidence_adapter_count"] == 1; assert data["short_lived_access_enabled"] is True; assert data["github_oidc_enabled"] is True'
          curl --fail --silent --show-error \
            --request POST http://127.0.0.1:8788/v1/auth/token \
            --header "Authorization: Bearer ci-proposer-secret-012345678901" \
            --header "Content-Type: application/json" \
            --data '{"scopes":["actions.evaluate"],"ttl_seconds":300}' \
            > /tmp/smerc-session.json
          SMERC_SESSION_TOKEN=$(python -c 'import json; print(json.load(open("/tmp/smerc-session.json"))["access_token"])')
          curl --fail --silent --show-error \
            --request POST http://127.0.0.1:8788/v1/evaluate \
            --header "Authorization: Bearer $SMERC_SESSION_TOKEN" \
            --header "Idempotency-Key: ci-container-smoke" \
            --header "Content-Type: application/json" \
            --data @examples/recoverability_single_action.json \
            > /tmp/smerc-session-decision.json
          python -c 'import json; session=json.load(open("/tmp/smerc-session.json")); data=json.load(open("/tmp/smerc-session-decision.json")); assert session["session"]["version"] == "smerc.access-token.v2"; assert data["authenticated_principal"]["credential_type"] == "short_lived_access_token"; assert data["authenticated_principal"]["scopes"] == ["actions.evaluate"]'

      - name: Exchange real GitHub OIDC identity and evaluate through container
        run: |
          GITHUB_OIDC_TOKEN=$(cat /tmp/github-oidc-token.txt)
          curl --fail --silent --show-error \
            --request POST http://127.0.0.1:8788/v1/auth/github \
            --header "Authorization: Bearer $GITHUB_OIDC_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{"scopes":["actions.evaluate"],"ttl_seconds":300}' \
            > /tmp/smerc-oidc-session.json
          SMERC_OIDC_SESSION=$(python -c 'import json; print(json.load(open("/tmp/smerc-oidc-session.json"))["access_token"])')
          curl --fail --silent --show-error \
            --request POST http://127.0.0.1:8788/v1/evaluate \
            --header "Authorization: Bearer $SMERC_OIDC_SESSION" \
            --header "Idempotency-Key: ci-oidc-container-smoke" \
            --header "Content-Type: application/json" \
            --data @examples/recoverability_single_action.json \
            > /tmp/smerc-oidc-decision.json
          python -c 'import json; data=json.load(open("/tmp/smerc-oidc-decision.json")); context=data["authenticated_principal"]["workload_context"]; assert context["provider"] == "github_actions_oidc"; assert context["repository"] == "${{ github.repository }}"; assert context["run_id"] == "${{ github.run_id }}"'
          rm /tmp/github-oidc-token.txt

      - name: Evaluate Action Language contract through container
        run: |
          curl --fail --silent --show-error \
            --request POST http://127.0.0.1:8788/v1/language/evaluate \
            --header "Authorization: Bearer ci-proposer-secret-012345678901" \
            --header "Idempotency-Key: ci-language-smoke" \
            --header "Content-Type: application/json" \
            --data @examples/action_language/production_database_change.json \
            > /tmp/smerc-language-decision.json
          python -c 'import json; data=json.load(open("/tmp/smerc-language-decision.json")); assert data["language_version"] == "smerc.decision.v1"; assert data["posture"] == "DENY"; assert data["transition"]["requires_new_request"] is True'

      - name: Evaluate through remote composite action
        id: remote-smerc
        uses: ./integrations/github_actions
        env:
          SMERC_API_KEY: ci-proposer-secret-012345678901
        with:
          action-file: examples/recoverability_single_action.json
          source: remote
          api-url: http://127.0.0.1:8788
          tenant: ci-tenant
          mode: observe
          api-failure-policy: fail
          output-file: smerc-remote-ci-decision.json

      - name: Assert remote composite outputs
        env:
          SMERC_STATUS: ${{ steps.remote-smerc.outputs.integration-status }}
          SMERC_POSTURE: ${{ steps.remote-smerc.outputs.posture }}
          SMERC_REPLAY_ID: ${{ steps.remote-smerc.outputs.replay-id }}
        run: |
          test "$SMERC_STATUS" = "evaluated"
          test -n "$SMERC_POSTURE"
          test -n "$SMERC_REPLAY_ID"
          python -m json.tool smerc-remote-ci-decision.json > /dev/null

      - name: Record pilot review and assert metrics
        env:
          SMERC_REPLAY_ID: ${{ steps.remote-smerc.outputs.replay-id }}
        run: |
          curl --fail --silent --show-error \
            --request POST "http://127.0.0.1:8788/v1/decisions/$SMERC_REPLAY_ID/reviews" \
            --header "Authorization: Bearer ci-reviewer-secret-012345678901" \
            --header "Idempotency-Key: ci-review-$SMERC_REPLAY_ID" \
            --header "Content-Type: application/json" \
            --data @examples/pilot_review.json \
            | python -m json.tool
          curl --fail --silent --show-error \
            --header "Authorization: Bearer ci-auditor-secret-0123456789012" \
            http://127.0.0.1:8788/v1/pilot/metrics \
            > /tmp/smerc-pilot-metrics.json
          python -c 'import json; data=json.load(open("/tmp/smerc-pilot-metrics.json")); assert data["review_count"] == 1; assert data["metrics"]["reviewer_agreement_rate"] == 1.0; assert data["metrics"]["useful_constraint_rate"] == 1.0'

      - name: Stop pilot API
        if: always()
        run: docker rm --force smerc-pilot-api
