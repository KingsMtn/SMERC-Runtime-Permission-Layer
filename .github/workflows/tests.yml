name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run financial profile smoke test
        run: python -m reference_engine.financial_permission_profile examples/financial_action_requests.json

      - name: Run financial replay smoke test
        run: python -m reference_engine.financial_replay examples/financial_replay_scenarios.json

      - name: Run policy comparison smoke test
        run: python -m reference_engine.financial_policy_comparison examples/financial_action_requests.json

      - name: Run audit-chain smoke test
        run: python -m reference_engine.financial_audit examples/financial_action_requests.json

